<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>האתר הנייד שלי</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0d0e15; color: #ffffff;
            overflow: hidden;
        }

        /* מסך חסימה למחשב - מוצג רק כשהמסך רחב */
        #desktop-blocker {
            display: flex; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #090a0f; color: #ff4a4a; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
            font-size: 22px; font-weight: bold; text-align: center;
        }
        #desktop-blocker .sub-text {
            font-size: 15px; color: #5f6275; margin-top: 10px; font-weight: normal;
        }

        /* תוכן האתר לטלפון */
        #mobile-content {
            display: none; padding: 30px 20px; text-align: center; box-sizing: border-box;
            height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* חוקי ה-CSS שקובעים מתי להציג מה: */
        /* אם רוחב המסך קטן מ-768px (כמו בטלפון או במצב מדמה טלפון ב-F12) */
        @media (max-width: 768px) {
            #desktop-blocker { display: none !important; }
            #mobile-content { display: flex !important; }
        }
        /* אם המסך גדול (מחשב רגיל) */
        @media (min-width: 769px) {
            #desktop-blocker { display: flex !important; }
            #mobile-content { display: none !important; }
        }

        /* עיצוב פיצ'ר משחק שיווי המשקל */
        .game-zone {
            position: relative; width: 240px; height: 240px;
            border: 4px solid #00ffaa; border-radius: 50%;
            margin: 25px auto; background: #141622;
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.15);
        }

        #ball {
            position: absolute; width: 24px; height: 24px;
            background: #00ffaa; border-radius: 50%;
            top: 108px; left: 108px; /* מרכז מדויק של העיגול */
            box-shadow: 0 0 10px #00ffaa;
            transition: transform 0.05s ease-out;
        }

        .action-btn {
            padding: 12px 30px; font-size: 16px; font-weight: bold;
            background: #00ffaa; color: #0d0e15; border: none;
            border-radius: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 255, 170, 0.3);
        }
        .action-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="desktop-blocker">
        <div>הגישה מותרת מטלפונים בלבד</div>
        <div class="sub-text">אנא היכנס מהסמארטפון או העבר למצב תצוגת נייד ב-F12</div>
    </div>

    <div id="mobile-content">
        <h1 style="margin: 0; font-size: 26px; color: #00ffaa;">NEXUS PLAY 🎯</h1>
        <p style="color: #8f94a8; font-size: 15px; margin: 10px 0 0 0;">נסה להשאיר את הכדור במרכז על ידי הטיית המכשיר!</p>
        
        <div class="game-zone">
            <div id="ball"></div>
        </div>
        
        <button id="start-btn" class="action-btn">הפעל חיישנים</button>
        <p id="status" style="color: #5f6275; font-size: 13px; margin-top: 15px; min-height: 18px;"></p>
    </div>

    <script>
        // שימוש ב-CSS בלבד בשביל החסימה פירושו שאין פקודות JS שאפשר לעקוף או להריץ במסוף!
        // הפקודה allowDesktop() הוסרה לחלוטין ולא קיימת יותר בקוד.

        const ball = document.getElementById('ball');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');

        let ballX = 108;
        let ballY = 108;
        let isGameRunning = false;

        startBtn.addEventListener('click', async () => {
            // בדיקת הרשאות חיישנים (חובה במכשירי אייפון/iOS)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        startGame();
                    } else {
                        statusText.innerText = "חובה לאשר גישה לחיישנים כדי לשחק.";
                    }
                } catch (error) {
                    statusText.innerText = "החיישנים דורשים אתר מאובטח (HTTPS) או מכשיר נייד אמיתי.";
                    // במצב F12 במחשב אין חיישנים פיזיים, אז נאפשר תנועה עם העכבר כדי שתוכל לבדוק שהכל עובד!
                    enableBackupControls();
                }
            } else {
                // מכשירי אנדרואיד או דפדפנים שלא דורשים אישור מיוחד
                startGame();
            }
        });

        function startGame() {
            if (isGameRunning) return;
            isGameRunning = true;
            startBtn.style.display = 'none';
            statusText.innerText = "החיישנים פעילים! הטה את הטלפון שלך.";

            window.addEventListener('deviceorientation', (event) => {
                let tiltX = event.gamma; // שמאל-ימין
                let tiltY = event.beta;  // קדימה-אחורה

                if (tiltX === null || tiltY === null) {
                    statusText.innerText = "לא נמצאו חיישני תנועה פיזיים במכשיר זה.";
                    enableBackupControls();
                    return;
                }

                // עדכון מיקום חלק (מפחיתים 45 מעלות מציר ה-Y כי מחזיקים את הטלפון בזווית מול הפנים)
                ballX += tiltX * 0.35;
                ballY += (tiltY - 45) * 0.35;

                // הגבלת תנועת הכדור בתוך גבולות העיגול (קוטר 240 פחות 24 של הכדור זה מקסימום 206)
                ballX = Math.max(10, Math.min(206, ballX));
                ballY = Math.max(10, Math.min(206, ballY));

                ball.style.left = ballX + 'px';
                ball.style.top = ballY + 'px';
            });
        }

        // שליטה חלופית עם העכבר - מופעלת רק אם פתחת את האתר דרך ה-F12 במחשב (מצב טלפון) ואין חיישנים
        function enableBackupControls() {
            startBtn.style.display = 'none';
            statusText.innerText = "מצב בדיקה: הזז את העכבר בתוך העיגול כדי לשלוט בכדור";
            
            const zone = document.querySelector('.game-zone');
            zone.addEventListener('mousemove', (e) => {
                const rect = zone.getBoundingClientRect();
                let mouseX = e.clientX - rect.left - 12;
                let mouseY = e.clientY - rect.top - 12;
                
                ball.style.left = Math.max(10, Math.min(206, mouseX)) + 'px';
                ball.style.top = Math.max(10, Math.min(206, mouseY)) + 'px';
            });
        }
    </script>
</body>
</html>
